<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تبييض فقاعات المانجا تلقائياً</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
    body {
        font-family: Tahoma, Arial, sans-serif;
        background: #1e1e2e;
        color: #fff;
        text-align: center;
        padding: 20px;
    }
    .container { max-width: 1000px; margin: auto; }

    label.dropZone {
        display: block;
        border: 3px dashed #888;
        border-radius: 15px;
        padding: 40px;
        margin: 20px 0;
        cursor: pointer;
        transition: 0.3s;
    }
    label.dropZone:hover, label.dropZone.dragover {
        background: #2e2e44;
        border-color: #6a5acd;
    }
    input[type=file] { display: none; }

    button, .btn {
        background: #6a5acd;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        margin: 5px;
    }
    button:hover { background: #7b6ce0; }
    button:disabled { background: #555; cursor: not-allowed; }

    #status { margin: 15px 0; font-size: 15px; color: #a0a0ff; }

    .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin: 15px 0;
    }

    #progressBar {
        width: 100%;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        height: 20px;
        margin: 10px 0;
        display: none;
    }
    #progressFill {
        height: 100%;
        background: linear-gradient(90deg,#6a5acd,#8a7aff);
        width: 0%;
        transition: width 0.2s;
    }

    #gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        margin-top: 20px;
    }
    .card {
        background: #2a2a3d;
        border-radius: 10px;
        padding: 10px;
        width: 220px;
    }
    .card img {
        max-width: 100%;
        border-radius: 6px;
        border: 1px solid #444;
    }
    .card .name {
        font-size: 12px;
        color: #ccc;
        margin: 6px 0;
        word-break: break-all;
    }
    .card .mini-status {
        font-size: 11px;
        color: #8a8aff;
    }
    .card button {
        font-size: 12px;
        padding: 5px 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🖌️ تبييض فقاعات المانجا تلقائياً</h1>
    <p>يدعم رفع عدة صور أو ملف ZIP يحتوي على صور - يعمل بالكامل في متصفحك</p>

    <label class="dropZone" id="dropZone" for="fileInput">
        📂 اسحب الصور أو ملف ZIP هنا، أو اضغط للاختيار
        <br><small>(يدعم: PNG, JPG, WEBP, ZIP)</small>
    </label>
    <input type="file" id="fileInput" accept="image/*,.zip,application/zip" multiple>

    <div class="controls">
        <label>اللغة:
            <select id="langSelect">
                <option value="eng">إنجليزي</option>
                <option value="jpn">ياباني</option>
                <option value="ara">عربي</option>
                <option value="eng+jpn">إنجليزي + ياباني</option>
            </select>
        </label>
        <label>الحشوة (Padding):
            <input type="range" id="paddingRange" min="0" max="30" value="8">
            <span id="paddingVal">8</span>px
        </label>
    </div>

    <div>
        <button id="processBtn" disabled>🚀 بدء التبييض لكل الصور</button>
        <button id="downloadAllBtn" disabled>📦 تحميل الكل (ZIP)</button>
        <button id="clearBtn" disabled>🗑️ مسح الكل</button>
    </div>

    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="status">في انتظار رفع صور أو ملف ZIP...</div>

    <div id="gallery"></div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const processBtn = document.getElementById('processBtn');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const clearBtn = document.getElementById('clearBtn');
const statusEl = document.getElementById('status');
const langSelect = document.getElementById('langSelect');
const paddingRange = document.getElementById('paddingRange');
const paddingVal = document.getElementById('paddingVal');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const gallery = document.getElementById('gallery');

// كل عنصر: { name, file (Blob/File), img (Image), canvas, processed (bool), card (DOM) }
let items = [];

paddingRange.addEventListener('input', () => {
    paddingVal.textContent = paddingRange.value;
});

// --- السحب والإفلات ---
dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

// --- اختيار الملفات (label + for يفتح النافذة تلقائياً بدون JS إضافي) ---
fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFiles(e.target.files);
    fileInput.value = ''; // للسماح برفع نفس الملف مرة أخرى لاحقاً
});

// --- معالجة الملفات المرفوعة (صور أو ZIP) ---
async function handleFiles(fileList) {
    statusEl.textContent = '⏳ جاري قراءة الملفات...';
    const files = Array.from(fileList);

    for (const file of files) {
        const isZip = file.type === 'application/zip' ||
                      file.type === 'application/x-zip-compressed' ||
                      file.name.toLowerCase().endsWith('.zip');

        if (isZip) {
            await extractZip(file);
        } else if (file.type.startsWith('image/')) {
            await addImageItem(file, file.name);
        }
    }

    updateButtonsState();
    statusEl.textContent = `✅ تم تحميل ${items.length} صورة - جاهزة للمعالجة`;
}

// استخراج الصور من ملف ZIP
async function extractZip(zipFile) {
    try {
        const zip = await JSZip.loadAsync(zipFile);
        const imageExt = /\.(png|jpe?g|webp|bmp)$/i;

        const entries = Object.values(zip.files).filter(
            f => !f.dir && imageExt.test(f.name)
        );

        for (const entry of entries) {
            const blob = await entry.async('blob');
            // تحديد نوع الصورة تلقائياً
            const ext = entry.name.split('.').pop().toLowerCase();
            const mime = ext === 'png' ? 'image/png' :
                         ext === 'webp' ? 'image/webp' : 'image/jpeg';
            const typedBlob = new Blob([blob], { type: mime });
            await addImageItem(typedBlob, entry.name.split('/').pop());
        }
    } catch (err) {
        console.error(err);
        statusEl.textContent = '❌ فشل استخراج ملف ZIP: ' + err.message;
    }
}

// إضافة صورة إلى القائمة وعرضها في المعرض
function addImageItem(fileOrBlob, name) {
    return new Promise((resolve) => {
        const url = URL.createObjectURL(fileOrBlob);
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const item = { name, img, canvas, processed: false };
            items.push(item);
            renderCard(item);
            resolve();
        };
        img.onerror = () => resolve(); // تجاهل الملفات التالفة
        img.src = url;
    });
}

// عرض بطاقة الصورة في المعرض
function renderCard(item) {
    const card = document.createElement('div');
    card.className = 'card';

    const imgPreview = document.createElement('img');
    imgPreview.src = item.canvas.toDataURL();

    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = item.name;

    const miniStatus = document.createElement('div');
    miniStatus.className = 'mini-status';
    miniStatus.textContent = 'بانتظار المعالجة';

    const dlBtn = document.createElement('button');
    dlBtn.textContent = '💾 تحميل';
    dlBtn.disabled = true;
    dlBtn.onclick = () => downloadSingle(item);

    card.appendChild(imgPreview);
    card.appendChild(nameEl);
    card.appendChild(miniStatus);
    card.appendChild(dlBtn);

    gallery.appendChild(card);

    item.card = card;
    item.imgPreview = imgPreview;
    item.miniStatus = miniStatus;
    item.dlBtn = dlBtn;
}

function updateButtonsState() {
    const hasItems = items.length > 0;
    processBtn.disabled = !hasItems;
    clearBtn.disabled = !hasItems;
    downloadAllBtn.disabled = !items.some(i => i.processed);
}

// --- مسح الكل ---
clearBtn.addEventListener('click', () => {
    items = [];
    gallery.innerHTML = '';
    updateButtonsState();
    statusEl.textContent = 'تم مسح كل الصور';
});

// --- معالجة كل الصور ---
processBtn.addEventListener('click', async () => {
    if (items.length === 0) return;

    processBtn.disabled = true;
    progressBar.style.display = 'block';

    const lang = langSelect.value;
    const padding = parseInt(paddingRange.value);

    statusEl.textContent = '⏳ جاري تحميل نموذج OCR (مرة واحدة فقط)...';

    const worker = await Tesseract.createWorker(lang, 1, {
        logger: () => {} // سنستخدم شريط تقدم عام بدل شريط لكل خطوة
    });

    for (let idx = 0; idx < items.length; idx++) {
        const item = items[idx];
        item.miniStatus.textContent = '🔍 جاري المعالجة...';
        statusEl.textContent = `معالجة الصورة ${idx + 1} من ${items.length}: ${item.name}`;
        progressFill.style.width = ((idx) / items.length * 100) + '%';

        try {
            await processOneImage(item, worker, padding);
            item.miniStatus.textContent = '✅ تم بنجاح';
            item.dlBtn.disabled = false;
        } catch (err) {
            console.error(err);
            item.miniStatus.textContent = '❌ فشلت المعالجة';
        }

        progressFill.style.width = ((idx + 1) / items.length * 100) + '%';
    }

    await worker.terminate();

    statusEl.textContent = `🎉 اكتملت معالجة ${items.length} صورة`;
    progressBar.style.display = 'none';
    processBtn.disabled = false;
    updateButtonsState();
});

// معالجة صورة واحدة: OCR + تبييض
async function processOneImage(item, worker, padding) {
    const ctx = item.canvas.getContext('2d');
    // إعادة رسم الصورة الأصلية أولاً (في حال إعادة المعالجة)
    ctx.drawImage(item.img, 0, 0);

    const { data } = await worker.recognize(item.canvas, {}, { blocks: true });

    let words = [];
    if (data.blocks) {
        data.blocks.forEach(block => {
            block.paragraphs.forEach(para => {
                para.lines.forEach(line => {
                    line.words.forEach(word => words.push(word));
                });
            });
        });
    } else if (data.words) {
        words = data.words;
    }

    const groups = groupWords(words, 40);

    groups.forEach(group => {
        const bbox = getGroupBBox(group, padding, item.canvas);
        ctx.fillStyle = 'white';
        ctx.fillRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);
    });

    item.processed = true;
    item.imgPreview.src = item.canvas.toDataURL();
}

// تجميع الكلمات المتقاربة (نفس الفقاعة تقريباً)
function groupWords(words, threshold) {
    const groups = [];
    const used = new Array(words.length).fill(false);

    for (let i = 0; i < words.length; i++) {
        if (used[i]) continue;
        if (words[i].confidence < 30) continue;

        let group = [words[i]];
        used[i] = true;

        let changed = true;
        while (changed) {
            changed = false;
            for (let j = 0; j < words.length; j++) {
                if (used[j]) continue;
                for (const w of group) {
                    if (isClose(w.bbox, words[j].bbox, threshold)) {
                        group.push(words[j]);
                        used[j] = true;
                        changed = true;
                        break;
                    }
                }
            }
        }
        groups.push(group);
    }
    return groups;
}

function isClose(b1, b2, threshold) {
    const dx = Math.max(b1.x0 - b2.x1, b2.x0 - b1.x1, 0);
    const dy = Math.max(b1.y0 - b2.y1, b2.y0 - b1.y1, 0);
    return Math.sqrt(dx*dx + dy*dy) < threshold;
}

function getGroupBBox(group, padding, canvas) {
    let x0 = Math.min(...group.map(w => w.bbox.x0)) - padding;
    let y0 = Math.min(...group.map(w => w.bbox.y0)) - padding;
    let x1 = Math.max(...group.map(w => w.bbox.x1)) + padding;
    let y1 = Math.max(...group.map(w => w.bbox.y1)) + padding;
    return {
        x0: Math.max(0, x0),
        y0: Math.max(0, y0),
        x1: Math.min(canvas.width, x1),
        y1: Math.min(canvas.height, y1)
    };
}

// --- تحميل صورة واحدة ---
function downloadSingle(item) {
    const link = document.createElement('a');
    link.download = 'whitened_' + item.name.replace(/\.[^.]+$/, '') + '.png';
    link.href = item.canvas.toDataURL('image/png');
    link.click();
}

// --- تحميل الكل كملف ZIP ---
downloadAllBtn.addEventListener('click', async () => {
    const processedItems = items.filter(i => i.processed);
    if (processedItems.length === 0) return;

    statusEl.textContent = '📦 جاري إنشاء ملف ZIP...';

    const zip = new JSZip();
    for (const item of processedItems) {
        const dataUrl = item.canvas.toDataURL('image/png');
        const base64 = dataUrl.split(',')[1];
        const fileName = 'whitened_' + item.name.replace(/\.[^.]+$/, '') + '.png';
        zip.file(fileName, base64, { base64: true });
    }

    const content = await zip.generateAsync({ type: 'blob' });
    saveAs(content, 'manga_whitened.zip');

    statusEl.textContent = '✅ تم تحميل ملف ZIP';
});
</script>

</body>
</html>
