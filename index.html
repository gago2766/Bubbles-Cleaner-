<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8"> <title>تبييض فقاعات المانجا تلقائياً</title> <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script> <style> body { font-family: Tahoma, Arial, sans-serif; background: #1e1e2e; color: #fff; text-align: center; padding: 20px; } .container { max-width: 900px; margin: auto; } #dropZone { border: 3px dashed #888; border-radius: 15px; padding: 40px; margin: 20px 0; cursor: pointer; transition: 0.3s; } #dropZone:hover, #dropZone.dragover { background: #2e2e44; border-color: #6a5acd; } input[type=file] { display: none; } #canvasWrap { position: relative; display: inline-block; margin-top: 20px; } canvas { max-width: 100%; border: 1px solid #444; border-radius: 8px; } button, .btn { background: #6a5acd; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 5px; } button:hover { background: #7b6ce0; } button:disabled { background: #555; cursor: not-allowed; } #status { margin: 15px 0; font-size: 15px; color: #a0a0ff; } .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 15px 0; } label { font-size: 14px; } #progressBar { width: 100%; background: #333; border-radius: 10px; overflow: hidden; height: 20px; margin: 10px 0; display: none; } #progressFill { height: 100%; background: linear-gradient(90deg,#6a5acd,#8a7aff); width: 0%; transition: width 0.2s; } </style> </head> <body> <div class="container"> <h1>🖌️ تبييض فقاعات المانجا تلقائياً</h1> <p>يعمل بالكامل في متصفحك - لا حاجة لسيرفر (باستخدام Tesseract.js)</p> <div id="dropZone"> 📂 اسحب الصورة هنا أو اضغط للاختيار <input type="file" id="fileInput" accept="image/*"> </div> <div class="controls"> <label>اللغة: <select id="langSelect"> <option value="eng">إنجليزي</option> <option value="jpn">ياباني</option> <option value="ara">عربي</option> <option value="eng+jpn">إنجليزي + ياباني</option> </select> </label> <label>الحشوة (Padding): <input type="range" id="paddingRange" min="0" max="30" value="8"> <span id="paddingVal">8</span>px </label> </div> <button id="processBtn" disabled>🚀 بدء التبييض</button> <button id="downloadBtn" disabled>💾 تحميل الصورة</button> <div id="progressBar"><div id="progressFill"></div></div> <div id="status">في انتظار رفع صورة...</div> <div id="canvasWrap"> <canvas id="canvas"></canvas> </div> </div> <script> const dropZone = document.getElementById('dropZone'); const fileInput = document.getElementById('fileInput'); const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); const processBtn = document.getElementById('processBtn'); const downloadBtn = document.getElementById('downloadBtn'); const statusEl = document.getElementById('status'); const langSelect = document.getElementById('langSelect'); const paddingRange = document.getElementById('paddingRange'); const paddingVal = document.getElementById('paddingVal'); const progressBar = document.getElementById('progressBar'); const progressFill = document.getElementById('progressFill'); let originalImage = null; paddingRange.addEventListener('input', () => { paddingVal.textContent = paddingRange.value; }); // --- رفع الصورة --- dropZone.addEventListener('click', () => fileInput.click()); dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); }); dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover')); dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); }); fileInput.addEventListener('change', e => { if (e.target.files.length) loadImage(e.target.files[0]); }); function loadImage(file) { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.onload = () => { originalImage = img; canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0); processBtn.disabled = false; downloadBtn.disabled = true; statusEl.textContent = `تم تحميل الصورة (${img.width}x${img.height}) - جاهز للمعالجة`; }; img.src = e.target.result; }; reader.readAsDataURL(file); } // --- معالجة OCR وتبييض الفقاعات --- processBtn.addEventListener('click', async () => { if (!originalImage) return; processBtn.disabled = true; progressBar.style.display = 'block'; progressFill.style.width = '0%'; // إعادة رسم الصورة الأصلية قبل المعالجة ctx.drawImage(originalImage, 0, 0); const lang = langSelect.value; const padding = parseInt(paddingRange.value); statusEl.textContent = '⏳ جاري تحميل نموذج OCR...'; try { const worker = await Tesseract.createWorker(lang, 1, { logger: m => { if (m.status && m.progress != null) { progressFill.style.width = (m.progress * 100) + '%'; statusEl.textContent = translateStatus(m.status) + ` (${Math.round(m.progress*100)}%)`; } } }); statusEl.textContent = '🔍 جاري اكتشاف النصوص...'; const { data } = await worker.recognize(canvas, {}, { blocks: true }); // استخراج كل الكلمات مع إحداثياتها let words = []; if (data.blocks) { data.blocks.forEach(block => { block.paragraphs.forEach(para => { para.lines.forEach(line => { line.words.forEach(word => words.push(word)); }); }); }); } else if (data.words) { words = data.words; } statusEl.textContent = `✅ تم اكتشاف ${words.length} كلمة - جاري التبييض...`; // تجميع الكلمات القريبة من بعضها في مجموعات (فقاعة واحدة تقريباً) const groups = groupWords(words, 40); groups.forEach(group => { const bbox = getGroupBBox(group, padding); ctx.fillStyle = 'white'; ctx.fillRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0); }); await worker.terminate(); statusEl.textContent = `🎉 تم الانتهاء! تم تبييض ${groups.length} منطقة`; downloadBtn.disabled = false; } catch (err) { console.error(err); statusEl.textContent = '❌ حدث خطأ: ' + err.message; } processBtn.disabled = false; progressBar.style.display = 'none'; }); function translateStatus(status) { const map = { 'loading tesseract core': 'تحميل محرك OCR', 'initializing tesseract': 'تهيئة المحرك', 'loading language traineddata': 'تحميل بيانات اللغة', 'initializing api': 'تهيئة الواجهة', 'recognizing text': 'التعرف على النص' }; return map[status] || status; } // تجميع الكلمات المتقاربة معاً (نفس الفقاعة) function groupWords(words, threshold) { const groups = []; const used = new Array(words.length).fill(false); for (let i = 0; i < words.length; i++) { if (used[i]) continue; if (words[i].confidence < 30) continue; // تجاهل النتائج الضعيفة let group = [words[i]]; used[i] = true; let changed = true; while (changed) { changed = false; for (let j = 0; j < words.length; j++) { if (used[j]) continue; for (const w of group) { if (isClose(w.bbox, words[j].bbox, threshold)) { group.push(words[j]); used[j] = true; changed = true; break; } } } } groups.push(group); } return groups; } function isClose(b1, b2, threshold) { const dx = Math.max(b1.x0 - b2.x1, b2.x0 - b1.x1, 0); const dy = Math.max(b1.y0 - b2.y1, b2.y0 - b1.y1, 0); return Math.sqrt(dx*dx + dy*dy) < threshold; } function getGroupBBox(group, padding) { let x0 = Math.min(...group.map(w => w.bbox.x0)) - padding; let y0 = Math.min(...group.map(w => w.bbox.y0)) - padding; let x1 = Math.max(...group.map(w => w.bbox.x1)) + padding; let y1 = Math.max(...group.map(w => w.bbox.y1)) + padding; return { x0: Math.max(0, x0), y0: Math.max(0, y0), x1: Math.min(canvas.width, x1), y1: Math.min(canvas.height, y1) }; } // --- تحميل الصورة النهائية --- downloadBtn.addEventListener('click', () => { const link = document.createElement('a'); link.download = 'manga_whitened.png'; link.href = canvas.toDataURL('image/png'); link.click(); }); </script> </body> </html>
